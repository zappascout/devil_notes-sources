name: Deploy MkDocs Site

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python version
        run: python --version

      - name: Print Python interpreter location
        run: which python

      - name: List installed Python packages
        run: pip list

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --clean

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --delete ./site/ ~/public_html/devil/notes/; quit" \
            -u ${{ secrets.SFTP_USERNAME }},${{ secrets.SFTP_PASSWORD }} \
            sftp://${{ secrets.SFTP_SERVER }}:${{ secrets.SFTP_PORT }}